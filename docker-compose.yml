version: '3.8'

services:
  tradeflow-api:
    build:
      context: https://github.com/Virgilio-24/tradeflow.git#main
    image: tradeflow-api
    container_name: tradeflow-api
    restart: always
    ports:
      - "3004:3004"
    shm_size: '256mb'
    security_opt:
      - seccomp=unconfined
    environment:
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - ADMIN_SECRET=${ADMIN_SECRET}
      - BROWSER_POOL_SIZE=${BROWSER_POOL_SIZE}
      - SIDECAR_URL=${SIDECAR_URL}
      - SIDECAR_API_KEY=${SIDECAR_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - NOTIFY_EMAIL=${NOTIFY_EMAIL}
      - PORT=${PORT}
      - APP_URL=${APP_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_STARTER=${STRIPE_PRICE_STARTER}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
      - STRIPE_PRICE_BUSINESS=${STRIPE_PRICE_BUSINESS}
      - STRIPE_PRICE_PACK_S=${STRIPE_PRICE_PACK_S}
      - STRIPE_PRICE_PACK_M=${STRIPE_PRICE_PACK_M}
      - STRIPE_PRICE_PACK_L=${STRIPE_PRICE_PACK_L}
      - STRIPE_PRICE_WHATSAPP=${STRIPE_PRICE_WHATSAPP}
