services:
  - type: web
    name: tradeflow
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: BROWSER_POOL_SIZE
        value: "2"
      - key: NODE_ENV
        value: production
